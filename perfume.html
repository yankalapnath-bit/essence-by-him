<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Perfumes - Essence by Him</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="brand-name">
                <h1>ESSENCE BY HIM</h1>
            </div>
        </div>
    </header>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="container">
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">HOME</a></li>
                <li><a href="brand.html" class="nav-link">BRAND</a></li>
                <li><a href="perfume.html" class="nav-link active">PERFUME</a></li>
                <li><a href="reviews.html" class="nav-link">REVIEWS</a></li>
                <li><a href="contact.html" class="nav-link">CONTACT US</a></li>
                <li><a href="#" class="nav-link cart-icon" id="cartIcon">🛒 CART (<span id="cartCount">0</span>)</a></li>
            </ul>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <section class="page-content">
        <div class="container">
            <h2 class="page-title">Our Collection</h2>

            <!-- SEARCH BAR -->
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-bar" 
                    placeholder="Search perfumes by name or scent..."
                >
                <button class="search-btn">Search</button>
            </div>

            <div class="perfume-gallery" id="perfumeGallery">
                <!-- Perfumes will be loaded here by JavaScript -->
            </div>

            <div id="noResults" class="no-results" style="display: none; text-align: center; padding: 40px;">
                <p style="font-size: 1.2rem; color: #999;">No perfumes found. Try a different search.</p>
            </div>
        </div>
    </section>

    <!-- FLOATING CART CARD -->
    <div class="floating-cart" id="floatingCart" style="display: none;">
        <button class="close-cart" id="closeCart">&times;</button>
        <h3>Cart Item</h3>
        <div class="cart-item-details" id="cartItemDetails"></div>
        <div class="cart-actions">
            <button class="btn-continue-shopping" id="continueShopping">Continue Shopping</button>
            <button class="btn-checkout">Proceed to Checkout</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Essence by Him. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms & Conditions</a>
                <a href="#">Shipping Info</a>
            </div>
        </div>
    </footer>

    <script src="database.js"></script>
    <script src="perfume-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
