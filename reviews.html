<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reviews - Essence by Him</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="brand-name">
                <h1>ESSENCE BY HIM</h1>
            </div>
        </div>
    </header>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="container">
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">HOME</a></li>
                <li><a href="brand.html" class="nav-link">BRAND</a></li>
                <li><a href="perfume.html" class="nav-link">PERFUME</a></li>
                <li><a href="reviews.html" class="nav-link active">REVIEWS</a></li>
                <li><a href="contact.html" class="nav-link">CONTACT US</a></li>
                <li><a href="#" class="nav-link cart-icon" id="cartIcon">🛒 CART (<span id="cartCount">0</span>)</a></li>
            </ul>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <section class="page-content">
        <div class="container">
            <h2 class="page-title">Customer Reviews & Submit Your Review</h2>

            <!-- SUBMIT REVIEW FORM -->
            <div style="max-width: 600px; margin: 0 auto 60px; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);">
                <h3 style="color: #d4af37; margin-bottom: 30px; text-transform: uppercase;">Share Your Experience</h3>
                <form id="reviewForm">
                    <div class="form-group">
                        <label for="reviewName">Your Name *</label>
                        <input type="text" id="reviewName" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="reviewEmail">Your Email *</label>
                        <input type="email" id="reviewEmail" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="productSelect">Select Perfume *</label>
                        <select id="productSelect" name="productId" required>
                            <option value="">-- Choose a perfume --</option>
                            <option value="1">Premium Essence - $89.99</option>
                            <option value="2">Midnight Mystery - $79.99</option>
                            <option value="3">Fresh Horizon - $74.99</option>
                            <option value="4">Amber Aura - $84.99</option>
                            <option value="5">Silver Storm - $94.99</option>
                            <option value="6">Velvet Touch - $89.99</option>
                            <option value="7">Ocean Breeze - $69.99</option>
                            <option value="8">Midnight Luxe - $99.99</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="rating">Rating *</label>
                        <select id="rating" name="rating" required>
                            <option value="">-- Select Rating --</option>
                            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                            <option value="4">⭐⭐⭐⭐ Very Good</option>
                            <option value="3">⭐⭐⭐ Good</option>
                            <option value="2">⭐⭐ Fair</option>
                            <option value="1">⭐ Poor</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reviewText">Your Review *</label>
                        <textarea id="reviewText" name="text" rows="5" placeholder="Share your thoughts about this perfume..." required></textarea>
                    </div>

                    <button type="submit" style="width: 100%;">Submit Review</button>
                </form>
            </div>

            <!-- CUSTOMER REVIEWS -->
            <h3 style="color: #2c1810; text-align: center; margin: 60px 0 40px; text-transform: uppercase; font-size: 1.8rem;">What Our Customers Say</h3>
            
            <div class="reviews-container" id="reviewsContainer">
                <!-- Reviews will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- FLOATING CART CARD -->
    <div class="floating-cart" id="floatingCart" style="display: none;">
        <button class="close-cart" id="closeCart">&times;</button>
        <h3>Your Cart</h3>
        <div class="cart-item-details" id="cartItemDetails"></div>
        <div class="cart-actions">
            <button class="btn-continue-shopping" id="continueShopping">Continue Shopping</button>
            <button class="btn-checkout">Proceed to Checkout</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Essence by Him. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms & Conditions</a>
                <a href="#">Shipping Info</a>
            </div>
        </div>
    </footer>

    <script src="database.js"></script>
    <script src="script.js"></script>
    <script>
        // Load reviews on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadReviews();
        });
    </script>
</body>
</html>
